    <script>
      const params = new URLSearchParams(window.location.search);
      const recipeName = params.get("recipe");
      const currentRecipe = recipes[recipeName];

      const scaleInput = document.getElementById("scale");
      const ingredientsList = document.getElementById("ingredientsList");
      const stepsList = document.getElementById("stepsList");

      function formatAmount(amount) {
        return Number.isInteger(amount) ? amount : amount.toFixed(1);
      }

      function getScaledIngredient(name) {
        const scale = Number(scaleInput.value);
        const ingredient = currentRecipe.ingredients.find(
          (item) => item.name === name,
        );

        if (!ingredient) {
          return name;
        }

        return `${formatAmount(ingredient.amount * scale)}${ingredient.unit}`;
      }

      function renderRecipe() {
        if (!currentRecipe) {
          document.getElementById("recipeTitle").textContent = "找不到这个食谱";
          return;
        }

        document.title = `${currentRecipe.title} | Chlotreats`;
        document.getElementById("recipeTitle").textContent =
          currentRecipe.title;
        document.getElementById("recipeName").textContent = currentRecipe.name;
        document.getElementById("recipeImage").src = currentRecipe.image;
        document.getElementById("recipeImage").alt = currentRecipe.title;
        document.getElementById("recipeImage").style.objectPosition =
          currentRecipe.imagePosition || "center center";
        document.getElementById("recipeIntro").innerHTML = currentRecipe.intro;

        renderAmounts();
      }

      function renderAmounts() {
        const scale = Number(scaleInput.value);

        ingredientsList.innerHTML = "";

        currentRecipe.ingredients.forEach((ingredient) => {
          const li = document.createElement("li");

          if (ingredient.type === "heading") {
            li.className = "ingredient-heading";
            li.textContent = ingredient.text;
          } else {
            const displayName = ingredient.displayName || ingredient.name;

            li.innerHTML = `
                    ${displayName}
                    <span class="amount">${formatAmount(ingredient.amount * scale)}</span>${ingredient.unit}
                  `;
          }

          ingredientsList.appendChild(li);
        });

        stepsList.innerHTML = "";

        currentRecipe.steps.forEach((step) => {
          const li = document.createElement("li");

          li.innerHTML = step.replace(/\{(.+?)\}/g, function (match, name) {
            return `<span class="amount">${getScaledIngredient(name)}</span>`;
          });

          stepsList.appendChild(li);
        });
      }

      renderRecipe();
      scaleInput.addEventListener("input", renderAmounts);

      let wakeLock = null;
      const wakeLockToggle = document.getElementById("wakeLockToggle");

      async function requestWakeLock() {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        } else {
          alert("这个浏览器不支持防止屏幕变暗功能。");
          wakeLockToggle.checked = false;
        }
      }

      async function releaseWakeLock() {
        if (wakeLock !== null) {
          await wakeLock.release();
          wakeLock = null;
        }
      }

      wakeLockToggle.addEventListener("change", async () => {
        if (wakeLockToggle.checked) {
          await requestWakeLock();
        } else {
          await releaseWakeLock();
        }
      });
      renderRecipe();
    </script>
